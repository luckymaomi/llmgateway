name: Verify

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
        env:
          POSTGRES_DB: llmgateway
          POSTGRES_USER: llmgateway
          POSTGRES_PASSWORD: llmgateway_ci
        ports:
          - 15432:5432
        options: >-
          --health-cmd "pg_isready -U llmgateway -d llmgateway"
          --health-interval 5s --health-timeout 3s --health-retries 20
      valkey:
        image: valkey/valkey@sha256:c9b77919daeba2c02ad954d0c844cc4e7142069d177b89c5fd771f405daf9e02
        ports:
          - 16380:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 20
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.5"
          cache: true
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: "10.33.0"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.19.0"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install browser
        run: pnpm --dir web exec playwright install --with-deps chromium
      - name: Verify
        shell: bash
        env:
          LLMGATEWAY_POSTGRES_PASSWORD: llmgateway_ci
          LLMGATEWAY_DATABASE_URL: postgres://llmgateway:llmgateway_ci@127.0.0.1:15432/llmgateway?sslmode=disable
          LLMGATEWAY_VALKEY_PASSWORD: ""
        run: xvfb-run --auto-servernum pwsh -NoProfile -File ./scripts/verify.ps1 -SkipBuildMatrix
      - name: Race detector
        run: go test -race ./internal/...

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.5"
          cache: true
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: "10.33.0"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.19.0"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Verify code and builds
        shell: pwsh
        run: ./scripts/verify.ps1 -SkipIntegration -SkipBrowser
      - name: Supply-chain source and dependency policy
        shell: pwsh
        run: ./scripts/test-supply-chain.ps1 -SkipImage
      - name: Race detector
        run: go test -race ./internal/...

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.5"
          cache: true
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: "10.33.0"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.19.0"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Build signed release
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $builtAt = git show -s --format=%cI "${{ github.sha }}"
          ./scripts/build-release.ps1 -Version $version -Revision "${{ github.sha }}" -BuiltAt $builtAt -SigningMode Keyless
          ./scripts/verify-release.ps1 -Directory ".build/release-$version" -Keyless
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: llmgateway-${{ github.ref_name }}
          path: .build/release-*
          if-no-files-found: error
          retention-days: 30
