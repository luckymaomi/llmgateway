<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLMGateway 管理员控制台样稿</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="administrator.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar admin-sidebar">
        <div class="brand">
          <span class="brand-mark">L</span><strong>LLMGateway</strong>
          <button class="icon-button sidebar-close" aria-label="关闭导航">×</button>
        </div>
        <nav class="nav" aria-label="管理员导航">
          <span class="nav-label">控制台</span>
          <button class="nav-item active" data-view="admin-dashboard">
            <span>▦</span>仪表盘
          </button>
          <button class="nav-item" data-view="operations">
            <span>▥</span>运维监控
          </button>
          <span class="nav-label">上游资源</span>
          <button class="nav-item" data-view="providers">
            <span>⬡</span>Provider
          </button>
          <button class="nav-item" data-view="models">
            <span>◇</span>模型
          </button>
          <button class="nav-item" data-view="credentials">
            <span>⚿</span>上游 API Key
          </button>
          <button class="nav-item" data-view="revisions">
            <span>↥</span>配置发布
          </button>
          <span class="nav-label">成员服务</span>
          <button class="nav-item" data-view="members">
            <span>♙</span>成员
          </button>
          <button class="nav-item" data-view="invitations">
            <span>✉</span>邀请
          </button>
          <button class="nav-item" data-view="gateway-keys">
            <span>⌁</span>Gateway Key
          </button>
          <button class="nav-item" data-view="entitlements">
            <span>◫</span>订阅与额度
          </button>
          <span class="nav-label">运营数据</span>
          <button class="nav-item" data-view="admin-requests">
            <span>≣</span>API 日志
          </button>
          <button class="nav-item" data-view="ledger">
            <span>▤</span>额度记录
          </button>
          <button class="nav-item" data-view="costs">
            <span>⌑</span>上游成本
          </button>
          <span class="nav-label">系统</span>
          <button class="nav-item" data-view="settings">
            <span>⚙</span>站点设置
          </button>
        </nav>
        <div class="identity">
          <span class="avatar">A</span
          ><span><strong>admin@example.com</strong><small>管理员</small></span>
        </div>
      </aside>
      <button class="menu-backdrop" aria-label="关闭导航"></button>
      <div class="workspace">
        <header class="topbar">
          <button class="icon-button mobile-menu" aria-label="打开导航">
            ☰
          </button>
          <div>
            <strong id="page-title">仪表盘</strong
            ><span class="context">管理员控制台</span>
          </div>
          <div class="top-actions">
            <span class="session"><i></i>运行正常</span
            ><button class="button secondary compact">退出登录</button>
          </div>
        </header>
        <main>
          <section class="view active admin-view" id="admin-view"></section>
        </main>
      </div>
    </div>
    <dialog id="admin-detail">
      <div class="dialog-head">
        <strong id="detail-title">详情</strong
        ><button class="icon-button" data-close aria-label="关闭">×</button>
      </div>
      <div id="detail-body" class="dialog-body"></div>
    </dialog>
    <div class="toast" id="toast" role="status"></div>
    <script src="administrator-data.js"></script>
    <script src="administrator.js"></script>
  </body>
</html>
